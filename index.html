<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pendulum Control</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <h2>☰</h2>
        <ul>
          <li>🏠 Home</li>
          <li class="active">🟣 Pendulum</li>
          <li>📊 Train</li>
          <li>📈 Gráficas</li>
        </ul>
        <div class="exit">⏻ Exit</div>
      </div>

      <!-- Main -->
      <div class="main">
        <h1>Pendulum</h1>
        <p class="subtitle">Visualización y controles del péndulo</p>

        <!-- Controls -->
        <div class="controls">
          <label>Tipo de control:</label>
          <select>
            <option>LQR</option>
          </select>

          <label>Puerto COM:</label>
          <select>
            <option>COM3</option>
          </select>

          <button onclick="start()">▶</button>
          <button onclick="stop()">⏸</button>
        </div>

        <!-- Canvas -->
        <div class="canvas-container">
          <canvas id="pendulumCanvas"></canvas>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
